<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahabi AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#202123;
color:white;
}

header{
background:#10a37f;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

#chat{
height:70vh;
padding:15px;
overflow-y:auto;
}

.message{
background:#343541;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.input-area{
display:flex;
padding:10px;
background:#2d2d2d;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
background:#10a37f;
color:white;
border:none;
border-radius:8px;
}
</style>
</head>
<body>

<header>
🤖 Sahabi AI
</header>

<div id="chat">
  <div class="message">
    <b>Sahabi AI:</b> Sannu! Barka da zuwa Sahabi AI. Yaya zan taimake ka?
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Rubuta tambayarka...">
  <button onclick="sendMessage()">Send</button>
</div>
<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chat");

  if (input.value.trim() === "") {
    return;
  }

  let userMessage = document.createElement("div");
  userMessage.className = "message";
  userMessage.innerHTML = "<b>Kai:</b> " + input.value;

  chat.appendChild(userMessage);

  let aiMessage = document.createElement("div");
  aiMessage.className = "message";
  aiMessage.innerHTML = "<b>Sahabi AI:</b> Na karɓi tambayarka. Nan ba da jimawa ba zan fara ba da amsoshi masu hankali.";

  chat.appendChild(aiMessage);

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
